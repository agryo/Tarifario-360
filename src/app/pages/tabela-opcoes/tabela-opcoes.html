<div class="tabela-opcoes-container p-1 border-round align-items-center mb-1">
  <!-- Cabeçalho -->
  <div class="header-area surface-card p-1 border-round shadow-6 text-center mb-3">
    <h1 class="text-2xl font-bold">🏢 Tabela de Opções</h1>
  </div>

  <!-- Configurações -->
  <div class="config-area p-3 border-round shadow-2">
    <div class="grid">
      <div class="col-12 md:col-4">
        <div class="field">
          <label for="checkin" class="font-bold">Check-in</label>
          <p-datepicker
            id="checkin"
            [(ngModel)]="dataCheckin"
            [showIcon]="true"
            dateFormat="dd/mm/yy"
            [minDate]="hoje"
            (onSelect)="onDataChange()"
            styleClass="w-full"
            appendTo="body"
          ></p-datepicker>
        </div>
      </div>
      <div class="col-12 md:col-4">
        <div class="field">
          <label for="checkout" class="font-bold">Check-out</label>
          <p-datepicker
            id="checkout"
            [(ngModel)]="dataCheckout"
            [showIcon]="true"
            dateFormat="dd/mm/yy"
            [minDate]="dataCheckin || hoje"
            (onSelect)="onDataChange()"
            styleClass="w-full"
            appendTo="body"
          ></p-datepicker>
        </div>
      </div>
      <div class="col-12 md:col-4">
        <div class="field">
          <label for="temporada" class="font-bold">Temporada</label>
          <p-select
            id="temporada"
            [(ngModel)]="temporada"
            [options]="[
              { label: 'Automático (Pela Data)', value: 'auto' },
              { label: 'Baixa Temporada', value: 'baixa' },
              { label: 'Alta Temporada', value: 'alta' },
            ]"
            optionLabel="label"
            optionValue="value"
            styleClass="w-full"
            (onChange)="gerar()"
          ></p-select>
        </div>
      </div>
    </div>
  </div>

  <!-- Colunas de seleção -->
  <div class="grid">
    <!-- Solteiros -->
    <div class="col-12 md:col-6">
      <div class="coluna-uh p-3 border-round shadow-2">
        <div class="titulo-coluna text-center font-bold mb-2">👤 SOLTEIROS</div>
        <p-button
          label="☑️ Marcar Todos"
          styleClass="p-button-sm p-button-outlined mb-2"
          (click)="toggleGrupo('solteiro')"
        ></p-button>
        <div *ngFor="let cat of categoriasSolteiro" class="item-quarto mb-1">
          <p-checkbox
            [(ngModel)]="cat.selecionado"
            [binary]="true"
            (onChange)="gerar()"
          ></p-checkbox>
          <label>{{ cat.nome }}</label>
        </div>
      </div>
    </div>
    <!-- Casais/Família -->
    <div class="col-12 md:col-6">
      <div class="coluna-uh p-3 border-round shadow-2">
        <div class="titulo-coluna text-center font-bold mb-2">👥 CASAL / FAMÍLIA</div>
        <p-button
          label="☑️ Marcar Todos"
          styleClass="p-button-sm p-button-outlined mb-2"
          (click)="toggleGrupo('casal')"
        ></p-button>
        <div *ngFor="let cat of categoriasCasal" class="item-quarto mb-1">
          <p-checkbox
            [(ngModel)]="cat.selecionado"
            [binary]="true"
            (onChange)="gerar()"
          ></p-checkbox>
          <label>{{ cat.nome }}</label>
        </div>
      </div>
    </div>
  </div>

  <!-- Botões -->
  <div class="acoes flex p-1 gap-2 justify-content-center shadow-2">
    <p-button
      label="COPIAR PARA WHATSAPP"
      icon="pi pi-whatsapp"
      styleClass="p-button-success"
      (click)="copiarTexto()"
    ></p-button>
    <p-button
      label="Voltar"
      icon="pi pi-arrow-left"
      styleClass="p-button-help"
      (click)="voltar()"
    ></p-button>
  </div>

  <!-- Prévia -->
  <div class="previa-area surface-ground p-3 border-round shadow-2 mt-3" *ngIf="textoPrevia">
    <pre class="previa-texto font-normal text-sm">{{ textoPrevia }}</pre>
  </div>
</div>
