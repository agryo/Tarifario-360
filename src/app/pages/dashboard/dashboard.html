<!-- Toast para mensagens -->
<p-toast position="top-center"></p-toast>

<p-confirmDialog [style]="{ width: '450px' }"></p-confirmDialog>

<div class="dashboard">
  <!-- Cabeçalho com saudação e botões -->
  <div class="flex justify-content-between align-items-center mb-4">
    <div class="cursor-pointer align-items-center mb-0 mt-0" routerLink="/">
      <h1 class="text-3xl font-bold mb-0 mt-0">🏨 Tarifário 360</h1>
      <p class="text-secondary text-center mb-0 mt-0">Sistema de Gestão Hoteleira</p>
    </div>
    <div class="flex align-items-center gap-2">
      <!-- Theme Toggle -->
      <app-theme-toggle></app-theme-toggle>

      <!-- Botão Configurações -->
      <p-button
        label="Configurações"
        icon="pi pi-cog"
        styleClass="p-button-help p-button-raised"
        (click)="abrirConfiguracoes()"
      >
      </p-button>
    </div>
  </div>

  <!-- Cards de resumo (sempre visíveis) -->
  <div class="grid mb-4">
    <div class="col-12 md:col-6 lg:col-3">
      <p-card styleClass="dashboard-card">
        <div class="flex align-items-center gap-3">
          <div class="card-icon bg-primary">
            <i class="pi pi-tag"></i>
          </div>
          <div>
            <span class="text-secondary block">Categorias</span>
            <span class="text-3xl font-bold">{{ totalCategorias }}</span>
          </div>
        </div>
      </p-card>
    </div>

    <div class="col-12 md:col-6 lg:col-3">
      <p-card styleClass="dashboard-card">
        <div class="flex align-items-center gap-3">
          <div class="card-icon bg-success">
            <i class="pi pi-percentage"></i>
          </div>
          <div>
            <span class="text-secondary block">Promoções</span>
            <span class="text-3xl font-bold">{{ config.promocao?.ativa ? 'Sim' : 'Não' }}</span>
          </div>
        </div>
      </p-card>
    </div>

    <div class="col-12 md:col-6 lg:col-3">
      <p-card styleClass="dashboard-card">
        <div class="flex align-items-center gap-3">
          <div class="card-icon bg-warning">
            <i class="pi pi-bolt"></i>
          </div>
          <div>
            <span class="text-secondary block">kWh</span>
            <span class="text-3xl font-bold">{{ config.precos?.kwh | currency: 'BRL' }}</span>
          </div>
        </div>
      </p-card>
    </div>

    <div class="col-12 md:col-6 lg:col-3">
      <p-card styleClass="dashboard-card">
        <div class="flex align-items-center gap-3">
          <div class="card-icon bg-info">
            <i class="pi pi-shop"></i>
          </div>
          <div>
            <span class="text-secondary block">Almoço</span>
            <span class="text-3xl font-bold">{{
              config.precos?.refeicoes?.almoco | currency: 'BRL'
            }}</span>
          </div>
        </div>
      </p-card>
    </div>
  </div>

  <!-- Área de conteúdo: Cards dos módulos ou módulo ativo -->
  <div class="modulo-container">
    <router-outlet></router-outlet>
  </div>
</div>

<!-- MODAL DE CONFIGURAÇÕES -->
<p-dialog
  [(visible)]="configDialogVisible"
  [style]="
    isPainelAutenticado
      ? { 'max-width': '95vw', width: '1400px' }
      : { width: '400px', 'max-width': '95vw' }
  "
  [header]="isPainelAutenticado ? '⚙️ Painel Master - Configurações Globais' : '🔒 Acesso Restrito'"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  (onHide)="fecharConfiguracoes()"
>
  <ng-template pTemplate="content">
    <app-painel-master
      [isVisible]="configDialogVisible"
      (onFechar)="fecharConfiguracoes()"
      (onSalvo)="carregarResumos()"
      (onAutenticadoChange)="handlePainelAuthState($event)"
    ></app-painel-master>
  </ng-template>
</p-dialog>
